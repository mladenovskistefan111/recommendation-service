name: CI - Main

on:
  workflow_dispatch:

  # push:
  #   branches:
  #     - main

jobs:
  # ─── STAGE 1 (parallel) ───────────────────────────────────────────────────

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: pip

      - name: Install lint tools
        run: pip install ruff==0.11.6

      - name: Check formatting (ruff format)
        run: ruff format --check .

      - name: Run linter (ruff check)
        run: ruff check .

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify import (build smoke)
        run: python -c "import ast, sys; ast.parse(open('src/server.py').read()); print('Parse OK')"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ─── STAGE 2 (parallel) ───────────────────────────────────────────────────

  sca:
    name: SCA - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit==2.9.0

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

  sast:
    name: SAST - Static Security Analysis
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: pip

      - name: Install bandit
        run: pip install bandit==1.8.3

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml

  # ─── STAGE 3 ──────────────────────────────────────────────────────────────

  build-and-stage:
    name: Build & Stage Image (ghcr.io)
    runs-on: ubuntu-latest
    needs: [sca, sast]
    permissions:
      contents: read
      packages: write
    outputs:
      staged-image: ${{ steps.image-ref.outputs.ref }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ghcr.io (staging)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract single image ref for scanning
        id: image-ref
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "ref=ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

  # ─── STAGE 4 ──────────────────────────────────────────────────────────────

  scan-image:
    name: Scan Image for CVEs
    runs-on: ubuntu-latest
    needs: [build-and-stage]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ needs.build-and-stage.outputs.staged-image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore

  # ─── STAGE 5 ──────────────────────────────────────────────────────────────

  push-and-sign:
    name: Push & Sign Image (Docker Hub)
    runs-on: ubuntu-latest
    needs: [scan-image, build-and-stage]
    permissions:
      id-token: write
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/recommendation-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push scanned image to Docker Hub
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKERHUB_USERNAME }}/recommendation-service@${{ steps.push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/recommendation-service@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom.spdx.json \
            ${{ secrets.DOCKERHUB_USERNAME }}/recommendation-service@${{ steps.push.outputs.digest }}